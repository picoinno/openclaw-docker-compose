services:
  # --- NETWORK LAYER ---
  tailscale:
    image: tailscale/tailscale:latest
    container_name: openclaw-vpn
    hostname: ${TS_HOSTNAME:-openclaw-agent}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATEFUL_CONFIG=false
    volumes:
      - ./tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  # --- CORE ENGINE ---
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    # This container shares the Tailscale network stack
    network_mode: "service:tailscale"
    volumes:
      - ./data/.openclaw:/home/node/.openclaw
      - ./data/workspace:/home/node/.openclaw/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # --- Required ---
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_TOKEN}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY} ### Or use any other LLM provider key from the list below
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      - BROWSER_WS_ENDPOINT=ws://localhost:3000
      - NODE_ENV=production
      # --- Optional: AI Providers ---
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_TTS_BASE_URL=${OPENAI_TTS_BASE_URL:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - VENICE_API_KEY=${VENICE_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - KILOCODE_API_KEY=${KILOCODE_API_KEY:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-}
      - XIAOMI_API_KEY=${XIAOMI_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      # --- Optional: Tools & Services ---
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      # --- Optional: Extra Channels ---
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      # --- Optional: Gateway ---
      - OPENCLAW_LOG_LEVEL=${OPENCLAW_LOG_LEVEL:-info}
    depends_on:
      - tailscale
      - openclaw-browser


  # --- BROWSER ENGINE ---
  openclaw-browser:
    image: browserless/chrome:latest
    container_name: openclaw-browser
    restart: unless-stopped
    # Shares Tailscale network so gateway can reach port 3000 on localhost
    network_mode: "service:tailscale"
    environment:
      - MAX_CONCURRENT_SESSIONS=3
      - CONNECTION_TIMEOUT=300000

  # --- MANAGEMENT TOOL ---
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    volumes:
      - ./data/.openclaw:/home/node/.openclaw
    entrypoint: ["node", "dist/index.js"]
    profiles: ["tools"]
