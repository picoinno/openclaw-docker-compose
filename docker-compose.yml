services:
  # --- NETWORK LAYER ---
  tailscale:
    image: tailscale/tailscale:v1.82.5
    container_name: openclaw-vpn
    hostname: ${TS_HOSTNAME:-openclaw-agent}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATEFUL_CONFIG=false
    volumes:
      - ./tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "tailscale", "status", "--json"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 256m
          cpus: "0.5"

  # --- CORE ENGINE ---
  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    stop_grace_period: 30s
    # Shares the Tailscale network stack
    network_mode: "service:tailscale"
    security_opt:
      - no-new-privileges:true
    volumes:
      - ./data/.openclaw:/home/node/.openclaw
      - ./data/workspace:/home/node/.openclaw/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      # --- Required ---
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # --- AI Provider (at least one required) ---
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - BROWSER_WS_ENDPOINT=ws://localhost:3000
      - NODE_ENV=production
      # --- Optional: AI Providers ---
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - OPENAI_TTS_BASE_URL=${OPENAI_TTS_BASE_URL:-}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - TOGETHER_API_KEY=${TOGETHER_API_KEY:-}
      - NVIDIA_API_KEY=${NVIDIA_API_KEY:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - VENICE_API_KEY=${VENICE_API_KEY:-}
      - HF_TOKEN=${HF_TOKEN:-}
      - KILOCODE_API_KEY=${KILOCODE_API_KEY:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - MINIMAX_API_KEY=${MINIMAX_API_KEY:-}
      - MINIMAX_BASE_URL=${MINIMAX_BASE_URL:-}
      - XIAOMI_API_KEY=${XIAOMI_API_KEY:-}
      - ZAI_API_KEY=${ZAI_API_KEY:-}
      - LITELLM_API_KEY=${LITELLM_API_KEY:-}
      # --- Optional: Tools & Services ---
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-}
      - FIRECRAWL_API_KEY=${FIRECRAWL_API_KEY:-}
      # --- Optional: Extra Channels ---
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      # --- Optional: Gateway ---
      - OPENCLAW_LOG_LEVEL=${OPENCLAW_LOG_LEVEL:-info}
      # --- Optional: GitHub ---
      - GITHUB_USERNAME_1=${GITHUB_USERNAME_1:-}
      - GITHUB_TOKEN_1=${GITHUB_TOKEN_1:-}
      - GITHUB_USERNAME_2=${GITHUB_USERNAME_2:-}
      - GITHUB_TOKEN_2=${GITHUB_TOKEN_2:-}
      - GITHUB_USERNAME_3=${GITHUB_USERNAME_3:-}
      - GITHUB_TOKEN_3=${GITHUB_TOKEN_3:-}
      - GIT_USER_NAME=${GIT_USER_NAME:-OpenClaw Agent}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-agent@openclaw.ai}
    depends_on:
      tailscale:
        condition: service_healthy
      openclaw-browser:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:18789/healthz"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    logging:
      driver: json-file
      options:
        max-size: "50m"
        max-file: "5"
    deploy:
      resources:
        limits:
          memory: 2g
          cpus: "2"

  # --- BROWSER ENGINE ---
  openclaw-browser:
    image: browserless/chrome:v2.25.2
    container_name: openclaw-browser
    restart: unless-stopped
    # Shares Tailscale network so gateway can reach port 3000 on localhost
    network_mode: "service:tailscale"
    security_opt:
      - no-new-privileges:true
    environment:
      - MAX_CONCURRENT_SESSIONS=3
      - CONNECTION_TIMEOUT=300000
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:3000/json/version"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 30s
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
    deploy:
      resources:
        limits:
          memory: 1g
          cpus: "1"

  # --- MANAGEMENT TOOL ---
  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    security_opt:
      - no-new-privileges:true
    cap_drop:
      - NET_RAW
      - NET_ADMIN
    volumes:
      - ./data/.openclaw:/home/node/.openclaw
    entrypoint: ["node", "dist/index.js"]
    profiles: ["tools"]
    logging:
      driver: json-file
      options:
        max-size: "5m"
        max-file: "2"
