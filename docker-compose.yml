services:
  tailscale:
    image: tailscale/tailscale:latest
    container_name: openclaw-vpn
    hostname: ${TS_HOSTNAME:-openclaw-agent}
    environment:
      - TS_AUTHKEY=${TS_AUTHKEY}
      - TS_STATEFUL_CONFIG=false
    volumes:
      - ./tailscale:/var/lib/tailscale
      - /dev/net/tun:/dev/net/tun
    cap_add:
      - NET_ADMIN
      - SYS_MODULE
    restart: unless-stopped

  openclaw-gateway:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-gateway
    restart: unless-stopped
    network_mode: "service:tailscale"
    volumes:
      - ./data/.openclaw:/home/node/.openclaw
      - ./data/workspace:/home/node/.openclaw/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      - OPENCLAW_GATEWAY_TOKEN=${OPENCLAW_TOKEN}
      - TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
      # --- AI Provider (at least one required) ---
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY:-}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - GROQ_API_KEY=${GROQ_API_KEY:-}
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      # --- Browser ---
      - BROWSER_WS_ENDPOINT=ws://localhost:3000?token=${BROWSER_TOKEN}
      # --- Optional ---
      - BRAVE_API_KEY=${BRAVE_API_KEY:-}
      - ELEVENLABS_API_KEY=${ELEVENLABS_API_KEY:-}
      - ELEVENLABS_VOICE_ID=${ELEVENLABS_VOICE_ID:-}
      - PERPLEXITY_API_KEY=${PERPLEXITY_API_KEY:-}
      - DEEPGRAM_API_KEY=${DEEPGRAM_API_KEY:-}
      - DISCORD_BOT_TOKEN=${DISCORD_BOT_TOKEN:-}
      - GITHUB_USERNAME_1=${GITHUB_USERNAME_1:-}
      - GITHUB_TOKEN_1=${GITHUB_TOKEN_1:-}
      - GITHUB_USERNAME_2=${GITHUB_USERNAME_2:-}
      - GITHUB_TOKEN_2=${GITHUB_TOKEN_2:-}
      - GIT_USER_NAME=${GIT_USER_NAME:-OpenClaw Agent}
      - GIT_USER_EMAIL=${GIT_USER_EMAIL:-}
      - NODE_ENV=production
      - OPENCLAW_LOG_LEVEL=${OPENCLAW_LOG_LEVEL:-info}
    depends_on:
      - tailscale
      - openclaw-browser

  openclaw-browser:
    image: browserless/chrome:latest
    container_name: openclaw-browser
    restart: unless-stopped
    network_mode: "service:tailscale"
    environment:
      - MAX_CONCURRENT_SESSIONS=3
      - CONNECTION_TIMEOUT=300000
      - TOKEN=${BROWSER_TOKEN}

  openclaw-cli:
    image: ghcr.io/openclaw/openclaw:latest
    container_name: openclaw-cli
    volumes:
      - ./data/.openclaw:/home/node/.openclaw
    entrypoint: ["node", "dist/index.js"]
    profiles: ["tools"]
